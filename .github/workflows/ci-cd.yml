name: CI/CD Pipeline

on:
  push:
    branches:
      - dev  # Trigger on push to the master branch

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and push frontend image
        run: |
          cd frontend
          docker build -t dhananjayakafle/dev_frontend:latest .
          docker push dhananjayakafle/dev_frontend:latest
      - name: Build and push backend image
        run: |
          cd backend
          docker build -t dhananjayakafle/dev_backend:latest .
          docker push dhananjayakafle/dev_backend:latest
  deploy-to-aks:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install kubectl
        run: |
          az aks install-cli
      - name: Get AKS credentials
        run: |
          az aks get-credentials --resource-group TermProject --name termCluster --overwrite-existing
      - name: Deploy to AKS
        run: |
          kubectl apply -f dev/backend-deployment.yaml -n dev
          kubectl apply -f dev/backend-service.yaml -n dev
          kubectl apply -f dev/frontend-deployment.yaml -n dev
          kubectl apply -f dev/frontend-service.yaml -n dev
          
      - name: Restart deployments to pull new images
        run: |
          kubectl rollout restart deployment/backend -n dev
          kubectl rollout restart deployment/frontend -n dev
